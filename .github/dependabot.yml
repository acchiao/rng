version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      timezone: America/Los_Angeles
      interval: daily
      time: "09:00"
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /
    schedule:
      timezone: America/Los_Angeles
      interval: daily
      time: "09:00"
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 10

  - package-ecosystem: gomod
    directory: /
    schedule:
      timezone: America/Los_Angeles
      interval: daily
      time: "09:00"
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 10
